name: A-kod automation

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-akod]

jobs:
  run-akod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}
          restore-keys: |
            playwright-${{ runner.os }}

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Get Dropbox access token
        id: dropbox-token
        shell: bash
        run: |
          RESPONSE=$(curl -s https://api.dropbox.com/oauth2/token \
            -d grant_type=refresh_token \
            -d refresh_token="${{ secrets.DROPBOX_REFRESH_TOKEN }}" \
            -d client_id="${{ secrets.DROPBOX_APP_KEY }}" \
            -d client_secret="${{ secrets.DROPBOX_APP_SECRET }}")

          echo "Dropbox token response:"
          echo "$RESPONSE"

          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Download queue.json from Dropbox
        shell: bash
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"path\":\"/queue/queue.json\"}" \
            -o queue.json

      - name: Show queue
        run: cat queue.json

      - name: Validate queue.json
        run: node -e "JSON.parse(require('fs').readFileSync('queue.json','utf8')); console.log('queue.json is valid JSON')"

      - name: Run script
        env:
          USERNAME: ${{ secrets.AKOD_USERNAME }}
          PASSWORD: ${{ secrets.AKOD_PASSWORD }}
          HEADLESS: "true"
          QUEUE_FILE: "./queue.json"
          RESULT_FILE: "./results.json"
        run: node script.js

      - name: Show results
        run: cat results.json

      - name: Upload results.json to Dropbox
        shell: bash
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"autorename\":false,\"mode\":\"overwrite\",\"mute\":true,\"path\":\"/results.json\",\"strict_conflict\":false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @results.json

      - name: Sync results to Supabase
        shell: bash
        run: |
          jq -c --arg token "${{ secrets.SUPABASE_SYNC_TOKEN }}" \
            '{ token: $token, items: . }' results.json > sync_payload.json

          curl -X POST https://sqqbujdebygfbcpztmri.supabase.co/functions/v1/sync-units \
            --header "Content-Type: application/json" \
            --data @sync_payload.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: akod-results
          path: results.json
