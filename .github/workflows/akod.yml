name: A-kod automation

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-akod]

jobs:
  run-akod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Get Dropbox access token
        id: dropbox-token
        shell: bash
        run: |
          RESPONSE=$(curl -s https://api.dropbox.com/oauth2/token \
            -d grant_type=refresh_token \
            -d refresh_token="${{ secrets.DROPBOX_REFRESH_TOKEN }}" \
            -d client_id="${{ secrets.DROPBOX_APP_KEY }}" \
            -d client_secret="${{ secrets.DROPBOX_APP_SECRET }}")

          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Download queue.json from Dropbox
        shell: bash
        env:
          DROPBOX_QUEUE_PATH: ${{ secrets.DROPBOX_QUEUE_PATH }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"path\":\"${DROPBOX_QUEUE_PATH}\"}" \
            -o queue.json

      - name: Show queue
        run: cat queue.json

      - name: Validate queue.json
        run: node -e "JSON.parse(require('fs').readFileSync('queue.json','utf8')); console.log('queue.json is valid JSON')"

      - name: Run script with retry
        shell: bash
        env:
          USERNAME: ${{ secrets.AKOD_USERNAME }}
          PASSWORD: ${{ secrets.AKOD_PASSWORD }}
          AKOD_LOGIN_URL: ${{ secrets.AKOD_LOGIN_URL }}
          HEADLESS: "true"
          QUEUE_FILE: "./queue.json"
          RESULT_FILE: "./results.json"
        run: |
          set +e

          max_attempts=3
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            echo "Kör script.js försök $attempt av $max_attempts"
            node script.js
            exit_code=$?

            if [ $exit_code -eq 0 ]; then
              echo "script.js lyckades på försök $attempt"
              break
            fi

            echo "script.js misslyckades på försök $attempt med exit code $exit_code"

            if [ $attempt -lt $max_attempts ]; then
              echo "Väntar 20 sekunder innan nytt försök..."
              sleep 20
            fi

            attempt=$((attempt + 1))
          done

          if [ $exit_code -ne 0 ]; then
            echo "Alla försök misslyckades"
            exit $exit_code
          fi

      - name: Show results
        run: cat results.json

      - name: Detect duplicates and build sync-ready file
        shell: bash
        run: |
          node -e "const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));
          const seen = new Map();
          const syncReady = [];
          const duplicates = [];
          const normTank = (v) => String(v || '').replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
          const normRef = (v) => String(v || '').replace(/[^0-9/]/g, '');

          for (const item of results) {
            const key = normTank(item.tank) + '__' + normRef(item.ref);

            if (!seen.has(key)) {
              seen.set(key, item);
              syncReady.push(item);
            } else {
              duplicates.push({
                ...item,
                duplicate: true,
                duplicateKey: key,
                duplicateOfId: seen.get(key)?.id ?? null,
                duplicateMessage: 'Dublett i samma körning. Skickades inte till Supabase sync.'
              });
            }
          }

          fs.writeFileSync('sync_results.json', JSON.stringify(syncReady, null, 2), 'utf8');
          fs.writeFileSync('duplicates.json', JSON.stringify(duplicates, null, 2), 'utf8');

          console.log(JSON.stringify({
            totalResults: results.length,
            syncReady: syncReady.length,
            duplicates: duplicates.length
          }, null, 2));"

      - name: Show duplicate summary
        shell: bash
        run: |
          node -e "const fs = require('fs');
          const duplicates = JSON.parse(fs.readFileSync('duplicates.json', 'utf8'));
          console.log({ duplicates: duplicates.length });
          if (duplicates.length) {
            console.log(JSON.stringify(duplicates, null, 2));
          }"

      - name: Upload results.json to Dropbox
        shell: bash
        env:
          DROPBOX_RESULTS_PATH: ${{ secrets.DROPBOX_RESULTS_PATH }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"autorename\":false,\"mode\":\"overwrite\",\"mute\":true,\"path\":\"${DROPBOX_RESULTS_PATH}\",\"strict_conflict\":false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @results.json

      - name: Build sync payload
        shell: bash
        env:
          SUPABASE_SYNC_TOKEN: ${{ secrets.SUPABASE_SYNC_TOKEN }}
        run: |
          node -e "const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('sync_results.json', 'utf8'));
          const payload = {
            token: process.env.SUPABASE_SYNC_TOKEN,
            items: results
          };
          fs.writeFileSync('sync_payload.json', JSON.stringify(payload));"

      - name: Show sync payload summary
        shell: bash
        run: |
          node -e "const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('sync_payload.json', 'utf8'));
          console.log({ items: Array.isArray(payload.items) ? payload.items.length : 0 });"

      - name: Sync results to Supabase
        shell: bash
        env:
          SUPABASE_SYNC_URL: ${{ secrets.SUPABASE_SYNC_URL }}
        run: |
          curl -s -X POST "$SUPABASE_SYNC_URL" \
            --header "Content-Type: application/json" \
            --data @sync_payload.json \
            -o sync_response.json

      - name: Show sync response
        run: cat sync_response.json

      - name: Build mail_notifications.json
        shell: bash
        run: |
          node -e "const fs = require('fs');
          const response = JSON.parse(fs.readFileSync('sync_response.json', 'utf8'));
          const notifications = response.notifications || [];
          fs.writeFileSync('mail_notifications.json', JSON.stringify(notifications));"

      - name: Show mail notifications summary
        shell: bash
        run: |
          node -e "const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('mail_notifications.json', 'utf8'));
          console.log({ notifications: Array.isArray(data) ? data.length : 0 });"

      - name: Upload mail_notifications.json to Dropbox
        shell: bash
        env:
          DROPBOX_MAIL_NOTIFICATIONS_PATH: ${{ secrets.DROPBOX_MAIL_NOTIFICATIONS_PATH }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"autorename\":false,\"mode\":\"overwrite\",\"mute\":true,\"path\":\"${DROPBOX_MAIL_NOTIFICATIONS_PATH}\",\"strict_conflict\":false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @mail_notifications.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: akod-results
          path: |
            results.json
            sync_results.json
            duplicates.json
            sync_response.json
            mail_notifications.json
