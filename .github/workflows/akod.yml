name: A-kod automation

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-akod]

jobs:
  run-akod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Get Dropbox access token
        id: dropbox-token
        shell: bash
        run: |
          RESPONSE=$(curl -s https://api.dropbox.com/oauth2/token \
            -d grant_type=refresh_token \
            -d refresh_token="${{ secrets.DROPBOX_REFRESH_TOKEN }}" \
            -d client_id="${{ secrets.DROPBOX_APP_KEY }}" \
            -d client_secret="${{ secrets.DROPBOX_APP_SECRET }}")
          echo "Dropbox token response:"
          echo "$RESPONSE"
          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Download queue.json from Dropbox
        shell: bash
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"path\":\"/queue/queue.json\"}" \
            -o queue.json

      - name: Show queue
        run: cat queue.json

      - name: Validate queue.json
        run: node -e "JSON.parse(require('fs').readFileSync('queue.json','utf8')); console.log('queue.json is valid JSON')"

      - name: Run script
        env:
          USERNAME: ${{ secrets.AKOD_USERNAME }}
          PASSWORD: ${{ secrets.AKOD_PASSWORD }}
          HEADLESS: "true"
          QUEUE_FILE: "./queue.json"
          RESULT_FILE: "./results.json"
        run: node script.js

      - name: Show results
        run: cat results.json

      - name: Upload results.json to Dropbox
        shell: bash
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"autorename\":false,\"mode\":\"overwrite\",\"mute\":true,\"path\":\"/results.json\",\"strict_conflict\":false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @results.json

      - name: Build sync payload
        shell: bash
        env:
          SUPABASE_SYNC_TOKEN: ${{ secrets.SUPABASE_SYNC_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));
            const payload = {
              token: process.env.SUPABASE_SYNC_TOKEN,
              items: results
            };
            fs.writeFileSync('sync_payload.json', JSON.stringify(payload));
          "

      - name: Show sync payload
        run: cat sync_payload.json

      - name: Sync results to Supabase
        shell: bash
        run: |
          curl -s -X POST https://sqqbujdebygfbcpztmri.supabase.co/functions/v1/sync-units \
            --header "Content-Type: application/json" \
            --data @sync_payload.json \
            -o sync_response.json

      - name: Show sync response
        run: cat sync_response.json

      - name: Build mail_notifications.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const response = JSON.parse(fs.readFileSync('sync_response.json', 'utf8'));
            const notifications = response.notifications || [];
            fs.writeFileSync('mail_notifications.json', JSON.stringify(notifications));
          "

      - name: Show mail notifications
        run: cat mail_notifications.json

      - name: Upload mail_notifications.json to Dropbox
        shell: bash
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer ${{ steps.dropbox-token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"autorename\":false,\"mode\":\"overwrite\",\"mute\":true,\"path\":\"/mail_notifications.json\",\"strict_conflict\":false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @mail_notifications.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: akod-results
          path: |
            results.json
            sync_response.json
            mail_notifications.json
