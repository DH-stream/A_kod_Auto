name: Sync from main repo

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Clone source repo
        run: |
          git clone https://github.com/DH-stream/dashboard.git source

      - name: Copy files
        run: |
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github/workflows" \
            source/ ./
          rm -rf source

      - name: Commit and push if changed
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Sync from dashboard"
          git push
